<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Synapse: neural connection icon in emerald green -->
  <!-- Central node -->
  <circle cx="24" cy="24" r="6" fill="#2dd4a0"/>
  <!-- Outer nodes -->
  <circle cx="10" cy="10" r="3.5" fill="#2dd4a0"/>
  <circle cx="38" cy="10" r="3.5" fill="#2dd4a0"/>
  <circle cx="10" cy="38" r="3.5" fill="#2dd4a0"/>
  <circle cx="38" cy="38" r="3.5" fill="#2dd4a0"/>
  <circle cx="6" cy="24" r="2.5" fill="#2dd4a0" opacity="0.7"/>
  <circle cx="42" cy="24" r="2.5" fill="#2dd4a0" opacity="0.7"/>
  <!-- Neural connections -->
  <line x1="19" y1="20" x2="13" y2="13" stroke="#2dd4a0" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="29" y1="20" x2="35" y2="13" stroke="#2dd4a0" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="19" y1="28" x2="13" y2="35" stroke="#2dd4a0" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="29" y1="28" x2="35" y2="35" stroke="#2dd4a0" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="18" y1="24" x2="9" y2="24" stroke="#2dd4a0" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="30" y1="24" x2="39" y2="24" stroke="#2dd4a0" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Spark / pulse in center -->
  <circle cx="24" cy="24" r="3" fill="#0b1a14"/>
  <circle cx="24" cy="24" r="1.5" fill="#5eead4"/>
</svg>
